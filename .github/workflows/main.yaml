name: CI

on:
  push:
    branches:
      - 'main'
  pull_request:

jobs:
  lint:
    name: run lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-repo
      - run: pnpm run lint
  format:
    name: run format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-repo
      - run: pnpm oxfmt --check
  build:
    name: run build and e2e tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-repo
      - run: pnpm run build
      - run: pnpm run test:e2e
  test:
    name: run test
    strategy:
      matrix:
        node_version: [18.x, 20.x, 22.x, 24.x]
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-repo
        with:
          node-version: ${{ matrix.node_version }}
      - run: pnpm run test:unit
